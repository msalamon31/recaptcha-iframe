<!DOCTYPE html>
<html>
<head>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
  <div id="captcha-container"></div>

  <script>
    var siteKey = new URLSearchParams(window.location.search).get('siteKey');
    console.log('iframe loaded, siteKey:', siteKey);

    function executeRecaptcha() {
      if (typeof grecaptcha === 'undefined') {
        console.log('grecaptcha not ready, waiting...');
        setTimeout(executeRecaptcha, 500);
        return;
      }
      grecaptcha.ready(function() {
        console.log('grecaptcha ready, rendering...');
        var widgetId = grecaptcha.render('captcha-container', {
          sitekey: siteKey,
          size: 'invisible',
          callback: function(token) {
            console.log('token received');
            window.parent.postMessage({ action: 'captchaToken', token: token }, '*');
          },
          'expired-callback': function() {
            console.log('token expired, re-executing...');
            grecaptcha.execute(widgetId);
          },
          'error-callback': function() {
            console.log('captcha error');
            window.parent.postMessage({ action: 'captchaError' }, '*');
          }
        });
        grecaptcha.execute(widgetId);
      });
    }

    window.addEventListener('message', function(event) {
      console.log('message received:', event.data);
    });

    // Wait for page to fully load before executing
    window.addEventListener('load', function() {
      console.log('page loaded, executing recaptcha...');
      executeRecaptcha();
    });
  </script>
</body>
</html>
