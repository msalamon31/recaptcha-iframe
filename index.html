<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    #captcha-container {
      display: flex;
      justify-content: center;
    }
  </style>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
  <div id="captcha-container"></div>

  <script>
    var siteKey = new URLSearchParams(window.location.search).get('siteKey');
    var widgetId;

    function executeRecaptcha() {
      if (typeof grecaptcha === 'undefined') {
        setTimeout(executeRecaptcha, 500);
        return;
      }
      grecaptcha.ready(function() {
        widgetId = grecaptcha.render('captcha-container', {
          sitekey: siteKey,
          size: 'invisible',
          callback: function(token) {
            window.parent.postMessage({ action: 'captchaToken', token: token }, '*');
          },
          'expired-callback': function() {
            setTimeout(function() { grecaptcha.execute(widgetId); }, 500);
          },
          'error-callback': function() {
            window.parent.postMessage({ action: 'captchaError' }, '*');
          }
        });
        setTimeout(function() {
          grecaptcha.execute(widgetId);
        }, 1000);
      });
    }

    window.addEventListener('load', function() {
      executeRecaptcha();
    });
  </script>
</body>
</html>
