<!DOCTYPE html>
<html>
<head>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
  <div id="captcha-container"></div>

  <script>
    var siteKey = new URLSearchParams(window.location.search).get('siteKey');
    console.log('iframe loaded, siteKey:', siteKey);
    var widgetId;

    function executeRecaptcha() {
      if (typeof grecaptcha === 'undefined') {
        console.log('grecaptcha not ready, waiting...');
        setTimeout(executeRecaptcha, 500);
        return;
      }
      grecaptcha.ready(function() {
        console.log('grecaptcha ready, rendering...');
        widgetId = grecaptcha.render('captcha-container', {
          sitekey: siteKey,
          size: 'invisible',
          callback: function(token) {
            console.log('token received at:', new Date().toISOString());
// MAR 13            window.parent.postMessage({ action: 'captchaToken', token: token }, '*');
            var msg = JSON.stringify({ action: 'captchaToken', token: token });
               try { window.parent.postMessage(msg, '*'); } catch(e) { console.log('parent failed:', e); }
    try { window.parent.parent.postMessage(msg, '*'); } catch(e) { console.log('parent.parent failed:', e); }
    try { window.top.postMessage(msg, '*'); } catch(e) { console.log('top failed:', e); }
          },
          'expired-callback': function() {
            console.log('token expired, re-executing...');
            setTimeout(function() { grecaptcha.execute(widgetId); }, 500);
          },
          'error-callback': function() {
            console.log('captcha error');
           // MAR 13 window.parent.postMessage({ action: 'captchaError' }, '*');
            window.top.postMessage(JSON.stringify({ action: 'captchaError' }), '*');
          }
        });
        console.log('waiting before execute...');
        setTimeout(function() {
          console.log('executing now...');
          grecaptcha.execute(widgetId);
        }, 1000);
      });
    }

    window.addEventListener('message', function(event) {
      console.log('message received:', event.data);
    });

    window.addEventListener('load', function() {
      console.log('page loaded, executing recaptcha...');
      executeRecaptcha();
    });
  </script>
</body>
</html>
